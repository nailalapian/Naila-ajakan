<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Buat Arwa 💕</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:#F8F2EC;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow-x:hidden;
}

.container{
width:100%;
max-width:650px;
background:white;
padding:30px;
border-radius:30px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
text-align:center;
position:relative;
overflow:hidden;
}

h1{
font-family:'Dancing Script',cursive;
font-size:48px;
color:#24364F;
margin-bottom:15px;
}

h2{
color:#24364F;
font-size:22px;
margin-bottom:15px;
}

p{
color:#666;
}

button{
border:none;
padding:13px 25px;
border-radius:50px;
cursor:pointer;
font-size:15px;
font-weight:600;
transition:.3s;
}

.btn-primary{
background:#8FB3D9;
color:white;
}

.btn-primary:hover{
transform:translateY(-3px);
}

.btn-secondary{
background:#eee;
color:#666;
}

input{
width:100%;
padding:14px;
border-radius:15px;
border:1px solid #ddd;
margin-top:10px;
font-size:15px;
}

.profile{
width:220px;
height:280px;
object-fit:cover;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.polaroid{
background:white;
padding:10px 10px 30px;
width:240px;
margin:auto;
border-radius:8px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
transform:rotate(-3deg);
}

.polaroid p{
margin-top:10px;
font-weight:600;
color:#e91e63;
}

.progress{
width:100%;
height:12px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.bar{
height:100%;
width:0%;
background:#8FB3D9;
animation:loading 3s linear forwards;
}

@keyframes loading{
to{
width:100%;
}
}

.flower{
font-size:80px;
animation:bloom 2s ease;
}

@keyframes bloom{
0%{
transform:scale(0);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}
}

.envelope{
font-size:120px;
cursor:pointer;
transition:.3s;
}

.envelope:hover{
transform:scale(1.1);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:20px;
}

.activity{
padding:15px;
border:1px solid #eee;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.activity:hover{
transform:translateY(-5px);
background:#f7fbff;
}

.activity span{
font-size:40px;
display:block;
margin-bottom:10px;
}

.result-card{
background:#FFF8FB;
border:2px dashed #8FB3D9;
border-radius:20px;
padding:20px;
margin-top:15px;
}

.time-group{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
margin-top:15px;
}

.time-btn{
background:#f2f2f2;
color:#555;
}

.selected{
background:#8FB3D9 !important;
color:white !important;
}

@media(max-width:600px){

h1{
font-size:38px;
}

.grid{
grid-template-columns:repeat(2,1fr);
}

.time-group{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="container" id="app"></div>

<script>

const app = document.getElementById("app");

const foto =
"https://raw.githubusercontent.com/nailalapian/Naila-ajakan/main/IMG-20260612-WA0027.jpg";

let tanggalDipilih = "";
let jamDipilih = "";
let waktuDipilih = "";
let aktivitasDipilih = "";

loadingPage();
  function loadingPage(){

app.innerHTML = `

<div class="flower">🌸</div>

<h2>Sebentar, bunganya sedang mekar...</h2>

<p>Tunggu bentar ya sayang 💕</p>

<div class="progress">
<div class="bar"></div>
</div>

`;

setTimeout(()=>{
amplopPage();
},3000);

}

// ====================
// HALAMAN AMPLOP
// ====================

function amplopPage(){

app.innerHTML = `

<p style="color:#e91e63;font-weight:600;">
Undangan Pribadi
</p>

<h1>buat Arwa 💕</h1>

<div
class="envelope"
onclick="ajakanPage()">
💌
</div>

<p>
Ada sesuatu buat kamu sayangku
</p>

<p style="font-size:12px;margin-top:10px;">
Tap amplopnya buat buka
</p>

`;

}

// ====================
// HALAMAN AJAKAN
// ====================

function ajakanPage(){

app.innerHTML = `

<div class="polaroid">

<img
src="${foto}"
class="profile">

<p>buat Arwa 💕</p>

</div>

<br>

<h2>
Mau enggak kamu pergi
kencan denganku?
</h2>

<p>
Aduu, pencet aja tombol
"Mau Buanget!"
</p>

<br>

<div id="buttonArea">

<button
class="btn-primary"
onclick="tanggalPage()">
Mau Buanget! 💕
</button>

<button
class="btn-secondary"
id="btnNo">
Ga Ah 😝
</button>

</div>

`;

const btnNo =
document.getElementById("btnNo");

btnNo.addEventListener(
"mouseover",
()=>{

const x =
Math.random()*
(window.innerWidth-150);

const y =
Math.random()*
(window.innerHeight-80);

btnNo.style.position =
"fixed";

btnNo.style.left =
x + "px";

btnNo.style.top =
y + "px";

}
);

}

// ====================
// HALAMAN TANGGAL
// ====================

function tanggalPage(){

app.innerHTML = `

<h1>
Kapan sayangku free?
</h1>

<p>
Pilih tanggal dan waktu ya 💕
</p>

<input
type="date"
id="tanggal">

<div class="time-group">

<button
class="time-btn"
onclick="pilihWaktu(this)">
Pagi
</button>

<button
class="time-btn"
onclick="pilihWaktu(this)">
Siang
</button>

<button
class="time-btn"
onclick="pilihWaktu(this)">
Sore
</button>

<button
class="time-btn"
onclick="pilihWaktu(this)">
Malam
</button>

</div>

<input
type="time"
id="jam">

<br><br>

<button
class="btn-primary"
onclick="aktivitasPage()">

Lanjut ➜

</button>

`;

}

// ====================
// PILIH WAKTU
// ====================

function pilihWaktu(el){

document
.querySelectorAll(".time-btn")
.forEach(btn=>{

btn.classList.remove(
"selected"
);

});

el.classList.add(
"selected"
);

waktuDipilih =
el.innerText;

}
  function aktivitasPage(){

tanggalDipilih =
document.getElementById(
"tanggal"
).value;

jamDipilih =
document.getElementById(
"jam"
).value;

if(
tanggalDipilih==="" ||
jamDipilih==="" ||
waktuDipilih===""
){
alert(
"Isi tanggal, jam, dan waktu dulu ya 💕"
);
return;
}

app.innerHTML = `

<h1>
Nanti kita ngapain sayang?
</h1>

<p>
Pilih aktivitas favorit kita 💕
</p>

<div class="grid">

<div
class="activity"
onclick="pilihAktivitas('🍝 Makan Bareng')">

<span>🍝</span>

Makan Bareng

</div>

<div
class="activity"
onclick="pilihAktivitas('☕ Ngopi Cantik')">

<span>☕</span>

Ngopi Cantik

</div>

<div
class="activity"
onclick="pilihAktivitas('🎬 Nonton')">

<span>🎬</span>

Nonton

</div>

<div
class="activity"
onclick="pilihAktivitas('🌅 Jalan Sore')">

<span>🌅</span>

Jalan Sore

</div>

<div
class="activity"
onclick="pilihAktivitas('🧺 Piknik')">

<span>🧺</span>

Piknik

</div>

<div
class="activity"
onclick="pilihAktivitas('🎮 Main Bareng')">

<span>🎮</span>

Main Bareng

</div>

<div
class="activity"
onclick="pilihAktivitas('🛍️ Belanja')">

<span>🛍️</span>

Belanja

</div>

<div
class="activity"
onclick="pilihAktivitas('🏠 Mager di Rumah')">

<span>🏠</span>

Mager di Rumah

</div>

</div>

`;

}

// ====================
// PILIH AKTIVITAS
// ====================

function pilihAktivitas(nama){

aktivitasDipilih = nama;

hasilPage();

}

// ====================
// HALAMAN HASIL
// ====================

function hasilPage(){

app.innerHTML = `

<h1>
Yeay! 💕
</h1>

<p>
Date plan kita berhasil dibuat
</p>

<div class="result-card">

<h3>
💕 Date Plan Kita 💕
</h3>

<br>

<p>
📅 ${tanggalDipilih}
</p>

<p>
🕒 ${waktuDipilih}
</p>

<p>
⏰ ${jamDipilih}
</p>

<p>
${aktivitasDipilih}
</p>

<br>

<p>
Aku tunggu ya ❤️
</p>

</div>

<br>

<button
class="btn-primary"
onclick="bagikanHasil()">

💕 Bagikan

</button>

`;

}

// ====================
// SHARE
// ====================

function bagikanHasil(){

const teks =

`💕 Date Plan Kita 💕

📅 ${tanggalDipilih}

🕒 ${waktuDipilih}

⏰ ${jamDipilih}

🎯 ${aktivitasDipilih}

Aku tunggu ya ❤️`;

if(navigator.share){

navigator.share({

title:
"Date Plan Kita 💕",

text:
teks,

url:
window.location.href

});

}else{

alert(teks);

}

}

</script>

</body>
</html>
