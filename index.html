<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pribadi buat Arwa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fce4ec;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px 20px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(251, 113, 133, 0.2);
            max-width: 90%;
            width: 380px;
            border: 1px solid #f8bbd0;
            position: relative;
        }

        /* --- ANIMASI BUNGA MEKAR (LOADING SCREEN) --- */
        .flower-loading {
            font-size: 60px;
            animation: mekar 2.5s ease-in-out forwards;
            display: inline-block;
            margin-bottom: 20px;
        }

        @keyframes mekar {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: scale(1.3) rotate(15deg); opacity: 1; }
        }

        .loading-text {
            color: #d81b60;
            font-size: 16px;
            font-style: italic;
            font-weight: 600;
        }

        /* --- STYLE KONTEN --- */
        h1 {
            color: #212121;
            font-size: 19px;
            font-weight: 700;
            line-height: 1.4;
            white-space: pre-line;
            margin-bottom: 20px;
        }

        .profile-img {
            width: 180px;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .sub-text {
            color: #d81b60;
            font-size: 15px;
            font-weight: 500;
            margin-top: 15px;
        }

        .hint-text {
            color: #757575;
            font-size: 12px;
            font-style: italic;
            margin-top: 5px;
        }

        /* --- STYLE AMPLOP --- */
        .envelope-wrapper {
            margin: 20px auto;
            cursor: pointer;
            display: inline-block;
            transition: transform 0.2s;
        }

        .envelope-wrapper:hover { transform: scale(1.1); }
        .envelope-icon { font-size: 80px; line-height: 1; }

        /* --- STYLE BUTTONS --- */
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            height: 50px;
            margin-top: 10px;
            position: relative;
        }

        button {
            padding: 12px 25px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background-color: #e91e63;
            color: white;
            box-shadow: 0 4px 10px rgba(233, 30, 99, 0.2);
            transition: all 0.2s ease;
            outline: none;
        }

        #btn-ngga {
            background-color: #f5f5f5;
            color: #9e9e9e;
            box-shadow: none;
            border: 1px solid #ddd;
        }

        .gif-small {
            width: 120px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="container" id="web-content">
        <div class="flower-loading">🌸</div>
        <h1 class="loading-text">Bentar bunganya mekar dulu...</h1>
    </div>

    <script>
        const contentArea = document.getElementById('web-content');
        
        // Link foto dari GitHub kamu (Sudah diubah ke format Raw)
        const fotoNaila = "https://raw.githubusercontent.com/nailalapian/Naila-ajakan/main/IMG-20260612-WA0027.jpg";

        // 1. Loading otomatis 3 detik
        setTimeout(() => {
            tampilkanHalamanAmplop();
        }, 3000);

        // 2. HALAMAN UTAMA: Amplop Undangan
        function tampilkanHalamanAmplop() {
            contentArea.innerHTML = `
                <p style="font-family:'Great Vibes', cursive; color:#e91e63; font-size:20px;">Undangan pribadi</p>
                <h1>buat arwa</h1>
                <div class="envelope-wrapper" onclick="bukaAmplop()">
                    <div class="envelope-icon">✉️</div>
                </div>
                <p class="sub-text">"ada sesuatu buat kamu sayang ku"</p>
                <p class="hint-text">tab amplopnya buat buka</p>
            `;
        }

        // 3. HALAMAN KEDUA: Ajakan Kencan dengan FOTO KAMU
        function bukaAmplop() {
            contentArea.innerHTML = `
                <img src="${fotoNaila}" class="profile-img" alt="Foto Arwa">
                <p style="color:#e91e63; font-weight:bold;">buat Arwa</p>
                <h1 style="font-size:22px;">Mau enggak kamu pergi kencan denganku?</h1>
                <p style="font-size:13px; color:#666; margin-bottom:10px;">Aduu, pencet aja tombol "mau buanget"</p>
                <div class="btn-group">
                    <button id="btn-mau" onclick="tampilkanSlideSukses()">mau buanget!</button>
                    <button id="btn-ngga">ga ah</button>
                </div>
            `;

            const btnNgga = document.getElementById('btn-ngga');
            btnNgga.addEventListener("mouseover", () => lari(btnNgga));
            btnNgga.addEventListener("touchstart", (e) => {
                e.preventDefault();
                lari(btnNgga);
            });
        }

        // 4. HALAMAN TERAKHIR: Sukses
        function tampilkanSlideSukses() {
            contentArea.innerHTML = `
                <h1 style="font-size:45px; margin-bottom:10px;">Yeay!</h1>
                <p style="font-weight:bold; color:#e91e63;">Arwa bilang iya... 💗</p>
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3E1b3ZpYmthbHh5ZzNndmtqZ3Rkdms4ZnV4ZHR2MnA2dWt1bTZ0biZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/t372vDp9mcnYgZToCO/giphy.gif" class="gif-small">
                <p style="font-size:14px; color:#444;">Makasih yaaa! Kabarin aku di WA ya sayang!</p>
            `;
        }

        // FUNGSI TOMBOL LARI
        function lari(element) {
            const padding = 60;
            const maxX = window.innerWidth - element.offsetWidth - padding;
            const maxY = window.innerHeight - element.offsetHeight - padding;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            element.style.position = "fixed";
            element.style.left = randomX + "px";
            element.style.top = randomY + "px";
            element.style.zIndex = "999";
        }
    </script>
</body>
</html>
