<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mau Nggak?</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffd1e8 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(224, 75, 147, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid #fff;
            max-width: 90%;
            width: 450px;
            transition: all 0.3s ease;
        }

        .gif-container img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 20px;
        }

        h1 {
            color: #d13b7d;
            font-size: 24px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 60px;
            position: relative;
        }

        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
            outline: none;
        }

        #btn-mau {
            background-color: #e04b93;
            color: white;
            box-shadow: 0 5px 15px rgba(224, 75, 147, 0.4);
        }

        #btn-mau:hover {
            background-color: #c9367c;
            transform: scale(1.05);
        }

        #btn-ngga {
            background-color: #9e9e9e;
            color: white;
            position: absolute; /* Penting untuk animasi lari */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            /* Memastikan tombol mulai di posisi kanan container */
            left: 55%; 
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <div class="gif-container">
            <img id="display-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3BwN3M0MnN2Z3h6Ym94bmM3azZ5MDZtcXBtZzd0ZnM4Ym82Y3Z0YSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/c4v65wP4gUf9MAtR8s/giphy.gif" alt="Cute gif">
        </div>
        
        <h1 id="question-text">Kamu mau nggak jadi pacar aku? 🫣</h1>

        <div class="btn-group">
            <button id="btn-mau" onclick="terimaKasih()">Mau</button>
            <button id="btn-ngga">Nggak Ah</button>
        </div>
    </div>

    <script>
        const btnNgga = document.getElementById('btn-ngga');
        const btnMau = document.getElementById('btn-mau');
        const questionText = document.getElementById('question-text');
        const displayImg = document.getElementById('display-img');

        // Fungsi membuat tombol "Nggak Ah" berpindah tempat spontan
        function lari() {
            // Menghitung batas aman pergerakan agar tidak keluar dari layar browser
            const padding = 20;
            const maxX = window.innerWidth - btnNgga.offsetWidth - padding;
            const maxY = window.innerHeight - btnNgga.offsetHeight - padding;

            // Mengenerate koordinat acak
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            // Mengubah posisi tombol menjadi absolut terhadap window browser
            btnNgga.style.position = 'fixed';
            btnNgga.style.left = randomX + 'px';
            btnNgga.style.top = randomY + 'px';
        }

        // Pemicu gerak: saat mouse mendekat (PC) dan saat disentuh (HP)
        btnNgga.addEventListener('mouseover', lari);
        btnNgga.addEventListener('touchstart', function(e) {
            e.preventDefault(); // Mencegah klik tidak sengaja di layar HP
            lari();
        });

        // Fungsi ketika tombol "Mau" diklik
        function terimaKasih() {
            // Ubah teks pertanyaan
            questionText.innerHTML = "Yeayyy! Makasih yaaa! 🥰❤️";
            
            // Ganti GIF jadi yang lebih happy
            displayImg.src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3E1b3ZpYmthbHh5ZzNndmtqZ3Rkdms4ZnV4ZHR2MnA2dWt1bTZ0biZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/t372vDp9mcnYgZToCO/giphy.gif";
            
            // Sembunyikan tombol "Nggak Ah"
            btnNgga.style.display = 'none';
            
            // Perbesar sedikit tombol "Mau" sebagai efek selebrasi
            btnMau.style.transform = 'scale(1.2)';
            btnMau.disabled = true; // Nonaktifkan setelah diklik
        }
    </script>
</body>
</html>
